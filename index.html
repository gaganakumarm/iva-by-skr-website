<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Iva By SKR — A Petrichor Hotel</title>
  <meta name="description" content="Iva By SKR — A Petrichor Hotel. A quiet stay opposite Hebbagodi Metro Station, Electronic City, Bengaluru.">

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --slate: #2E5470;
      --charcoal: #2B2E33;
      --clay: #A9663F;
      --mist: #F3EFE6;
      --stone: #C9C2B4;
      --dusk-gold: #C79A4B;
      --paper: #FBFAF6;
      --font-body: clamp(1rem, 0.95rem + 0.3vw, 1.125rem);
      --font-small: clamp(0.8rem, 0.75rem + 0.2vw, 0.95rem);
      --font-button: clamp(0.9rem, 0.85rem + 0.2vw, 1rem);
      --font-h1: clamp(2.25rem, 1.8rem + 3vw, 3.75rem);
      --font-h2: clamp(1.75rem, 1.4rem + 2vw, 2.5rem);
      --font-h3: clamp(1.125rem, 1rem + 0.6vw, 1.375rem);
    }

    html {
      scroll-behavior: smooth;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--charcoal);
      font-family: 'Work Sans', sans-serif;
      font-size: var(--font-body);
      line-height: 1.65;
    }

    h1, h2, h3 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .intro-loader {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(251, 250, 246, 0.98), rgba(243, 239, 230, 0.96));
      opacity: 1;
      visibility: visible;
      pointer-events: none;
      animation: loaderSafetyFade 0.45s ease 2s forwards;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .intro-loader.done {
      opacity: 0;
      visibility: hidden;
    }

    .intro-loader img {
      width: clamp(160px, 22vw, 260px);
      height: auto;
      opacity: 0;
      transform: scale(1.12);
      animation: logoIntro 1.8s cubic-bezier(.2,.7,.2,1) forwards;
      filter: drop-shadow(0 18px 32px rgba(43, 46, 51, 0.14));
    }

    @keyframes logoIntro {
      0% { opacity: 0; transform: scale(1.16); }
      28% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes loaderSafetyFade {
      to { opacity: 0; visibility: hidden; }
    }

    .site-header {
      background: #FFFFFF;
      box-shadow: 0 1px 0 rgba(43, 46, 51, 0.08);
      position: relative;
      z-index: 10;
    }

    .main-header {
      min-height: 168px;
      display: flex;
      align-items: center;
    }

    .site-header .wrap {
      max-width: 1650px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand-logo {
      height: 148px;
      width: auto;
      max-width: 280px;
      display: block;
      object-fit: contain;
    }

    .btn-book {
      background: var(--slate);
      color: #FFFFFF;
      padding: 22px 42px;
      border-radius: 10px;
      text-decoration: none;
      font-size: var(--font-button);
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      line-height: 1;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-book:hover {
      background: var(--charcoal);
      transform: translateY(-1px);
    }

    .btn-rooms {
      color: var(--charcoal);
      padding: 20px 34px;
      border: 2px solid var(--clay);
      border-radius: 10px;
      text-decoration: none;
      font-size: var(--font-button);
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .btn-rooms:hover {
      background: var(--clay);
      color: #FFFFFF;
      transform: translateY(-1px);
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      flex-wrap: wrap;
      gap: 14px clamp(22px, 2vw, 36px);
      margin-left: auto;
    }

    .desktop-nav a {
      display: block;
      color: var(--charcoal);
      text-decoration: none;
      font-size: clamp(0.95rem, 0.88rem + 0.35vw, 1.125rem);
      font-weight: 600;
      line-height: 1.35;
    }

    .desktop-nav a:hover {
      color: var(--slate);
    }

    .nav-caret {
      display: inline-block;
      margin-left: 6px;
      transform: translateY(-1px);
      font-size: 0.95em;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 5px;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      flex: none;
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--charcoal);
      border-radius: 1px;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      padding: 12px 24px 18px;
      background: #FFFFFF;
      border-top: 1px solid rgba(43, 46, 51, 0.12);
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav a {
      padding: 14px 0;
      color: var(--charcoal);
      text-decoration: none;
      font-size: var(--font-body);
      font-weight: 600;
      border-bottom: 1px solid var(--stone);
    }

    .mobile-nav a:last-child {
      border-bottom: 0;
    }

    .mobile-nav .mobile-menu-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding-top: 16px;
    }

    .mobile-nav .mobile-menu-actions a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-bottom: 0;
      border-radius: 8px;
      font-size: var(--font-button);
      font-weight: 700;
      text-align: center;
    }

    .mobile-nav .mobile-menu-actions .btn-rooms {
      border: 2px solid var(--clay);
    }

    .mobile-nav .mobile-menu-actions .btn-book {
      color: #FFFFFF;
    }

    @media (max-width: 760px) {
      .brand-logo {
        height: 104px;
        max-width: 200px;
      }

      .desktop-nav {
        display: none;
      }

      .nav > .btn-book,
      .nav > .btn-rooms {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .main-header {
        min-height: 120px;
      }

      .nav {
        gap: 16px;
      }
    }

    .hero {
      position: relative;
      padding: 0;
      min-height: clamp(520px, 54vw, 720px);
      color: #FFFFFF;
    }

    .address-strip {
      overflow: hidden;
      background: var(--charcoal);
      color: var(--paper);
      border-top: 1px solid rgba(251, 250, 246, 0.08);
      border-bottom: 1px solid rgba(251, 250, 246, 0.08);
    }

    .address-track {
      display: flex;
      width: max-content;
      animation: addressTicker 22s linear infinite;
    }

    .address-track span {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 32px;
      white-space: nowrap;
      font-size: var(--font-small);
      letter-spacing: 0.02em;
    }

    @keyframes addressTicker {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    .hero-image {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 34% 46%, rgba(43, 46, 51, 0.84) 0%, rgba(43, 46, 51, 0.68) 34%, rgba(43, 46, 51, 0.2) 72%),
        linear-gradient(90deg, rgba(43, 46, 51, 0.92) 0%, rgba(43, 46, 51, 0.72) 48%, rgba(43, 46, 51, 0.32) 100%),
        linear-gradient(to bottom, rgba(43, 46, 51, 0.2) 0%, rgba(43, 46, 51, 0.6) 100%),
        url("images/hero.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      min-height: inherit;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 56px;
      padding-bottom: 56px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.42);
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: var(--font-small);
      color: rgba(251, 250, 246, 0.94);
      margin: 0 0 16px;
    }

    .hero h1 {
      font-size: var(--font-h1);
      max-width: 18ch;
      margin: 0 0 20px;
      text-shadow: 0 2px 18px rgba(43, 46, 51, 0.45);
    }

    .hero h1 em {
      color: #FFFFFF;
      font-style: italic;
    }

    .hero-subtext {
      max-width: 62ch;
      color: rgba(251, 250, 246, 0.96);
      font-size: var(--font-body);
      margin: 0;
    }

    .hero .btn-book {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: flex-start;
      margin-top: 32px;
      padding: 16px 30px;
    }

    @media (max-width: 760px) {
      .hero {
        min-height: clamp(560px, 128vw, 680px);
      }

      .hero-image {
        background-image:
          linear-gradient(to bottom, rgba(43, 46, 51, 0.62) 0%, rgba(43, 46, 51, 0.9) 100%),
          linear-gradient(to bottom, rgba(43, 46, 51, 0.2) 0%, rgba(43, 46, 51, 0.6) 100%),
          url("images/hero.png");
      }

    }

    .rooms {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .rooms h2 {
      margin: 0 0 32px;
      font-size: var(--font-h2);
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .room-card {
      background: var(--paper);
      border-radius: 4px;
      overflow: hidden;
    }

    .room-band {
      position: relative;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    .room-band::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(135deg, rgba(251, 250, 246, 0.12) 0 1px, transparent 1px 9px);
      opacity: 0.72;
      pointer-events: none;
    }

    .band-a {
      background: linear-gradient(135deg, var(--slate), #527C99);
    }

    .band-b {
      background: linear-gradient(135deg, var(--clay), var(--dusk-gold));
    }

    .band-c {
      background: linear-gradient(135deg, var(--stone), #DED7C9);
    }

    .room-body {
      padding: 20px;
    }

    .room-band-tag {
      position: absolute;
      z-index: 1;
      left: 20px;
      top: 18px;
      text-transform: uppercase;
      font-size: var(--font-small);
      letter-spacing: 0.06em;
      color: rgba(251, 250, 246, 0.94);
      background: rgba(43, 46, 51, 0.34);
      padding: 4px 8px;
      border-radius: 999px;
      margin: 0;
    }

    .room-photo-placeholder {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(43, 46, 51, 0.48);
      box-shadow: 0 8px 24px rgba(43, 46, 51, 0.2);
    }

    .room-photo-placeholder svg {
      width: 28px;
      height: 28px;
      color: rgba(251, 250, 246, 0.94);
    }

    .room-photo-note {
      margin: 0;
      color: rgba(251, 250, 246, 0.96);
      font-size: clamp(0.72rem, 0.68rem + 0.16vw, 0.84rem);
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .room-body h3 {
      margin: 0 0 8px;
      font-size: var(--font-h3);
    }

    .room-desc {
      color: var(--charcoal);
      margin: 0 0 16px;
    }

    .room-meta {
      font-size: var(--font-small);
      color: var(--slate);
      margin: 0;
    }

    @media (max-width: 900px) {
      .rooms-grid {
        grid-template-columns: 1fr;
      }
    }

    .amenities {
      padding: 64px 0 96px;
    }

    .amenities h2 {
      margin: 0 0 32px;
      font-size: var(--font-h2);
    }

    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
    }

    .amenity-card {
      padding: 24px;
      border: 1px solid var(--stone);
      border-radius: 4px;
    }

    .amenity-num {
      display: block;
      font-family: 'Fraunces', serif;
      font-size: clamp(1.5rem, 1.2rem + 1vw, 1.9rem);
      color: #8F5437;
      margin-bottom: 12px;
    }

    .amenity-card h3 {
      margin: 0 0 8px;
      font-size: var(--font-h3);
    }

    .amenity-card p {
      margin: 0;
      color: var(--charcoal);
      font-size: var(--font-body);
    }

    @media (max-width: 800px) {
      .amenities-grid {
        grid-template-columns: repeat(5, minmax(180px, 1fr));
        overflow-x: auto;
        padding-bottom: 8px;
      }
    }

    .gallery {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .gallery h2 {
      margin: 0 0 32px;
      font-size: var(--font-h2);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .gallery-tile {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      padding: 0;
      border-radius: 4px;
      background-color: var(--slate);
      background-image: linear-gradient(135deg, var(--slate), var(--charcoal));
    }

    .gallery-tile img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .reviews {
      padding: 64px 0 96px;
      background: var(--slate);
    }

    .reviews h2 {
      margin: 0;
      font-size: var(--font-h2);
      max-width: 32ch;
      color: var(--paper);
    }

    .reviews-header {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      align-items: end;
      margin-bottom: 32px;
    }

    .rating-summary {
      flex: none;
      max-width: 320px;
      padding: 18px 22px;
      border: 1px solid rgba(251, 250, 246, 0.24);
      border-radius: 6px;
      background: rgba(43, 46, 51, 0.18);
      color: var(--paper);
      text-align: right;
    }

    .rating-summary strong {
      display: block;
      margin-bottom: 4px;
      color: var(--dusk-gold);
      font-family: 'Fraunces', serif;
      font-size: clamp(1.25rem, 1rem + 0.8vw, 1.75rem);
      font-weight: 500;
    }

    .rating-summary span {
      display: block;
      color: rgba(251, 250, 246, 0.78);
      font-size: var(--font-small);
    }

    .reviews-carousel {
      position: relative;
    }

    .reviews-viewport {
      overflow: hidden;
    }

    .reviews-track {
      display: flex;
      gap: 24px;
      transition: transform 0.35s ease;
    }

    .review-card {
      flex: 0 0 calc((100% - 48px) / 3);
      padding: 28px;
      background: var(--mist);
      border: 1px solid rgba(251, 250, 246, 0.28);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(43, 46, 51, 0.18);
    }

    .review-stars {
      color: var(--dusk-gold);
      letter-spacing: 0.1em;
      margin: 0 0 12px;
    }

    .review-text {
      margin: 0 0 16px;
      color: var(--charcoal);
      line-height: 1.68;
    }

    .review-source {
      display: inline-flex;
      margin: 0;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(46, 84, 112, 0.1);
      font-size: var(--font-small);
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .review-nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }

    .review-arrow {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--dusk-gold);
      border-radius: 50%;
      background: var(--charcoal);
      color: var(--dusk-gold);
      cursor: pointer;
    }

    .review-arrow:hover {
      background: var(--dusk-gold);
      color: var(--charcoal);
    }

    .review-arrow svg {
      width: 20px;
      height: 20px;
    }

    .review-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .review-dot {
      width: 9px;
      height: 9px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: var(--stone);
      cursor: pointer;
    }

    .review-dot.active {
      background: var(--clay);
    }

    @media (prefers-reduced-motion: reduce) {
      .reviews-track {
        transition: none;
      }
    }

    @media (max-width: 900px) {
      .reviews-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .rating-summary {
        width: 100%;
        max-width: none;
        text-align: left;
      }

      .review-card {
        flex-basis: 100%;
      }
    }

    .book {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .book h2 {
      margin: 0 0 32px;
      font-size: var(--font-h2);
    }

    .ota-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .ota-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
      background: var(--paper);
      border-radius: 4px;
      text-decoration: none;
      color: var(--charcoal);
      border: 1px solid var(--stone);
    }

    .ota-name {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: var(--font-h3);
    }

    .ota-cta {
      font-size: var(--font-small);
      color: var(--charcoal);
      text-decoration: underline;
      text-decoration-color: var(--clay);
      text-underline-offset: 3px;
    }

    .book-direct {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--stone);
    }

    .book-direct p {
      max-width: 68ch;
      margin: 0;
      color: var(--charcoal);
    }

    .book-direct .btn-book {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 28px;
      flex: none;
    }

    @media (max-width: 800px) {
      .ota-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .book-direct {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .ota-grid {
        grid-template-columns: 1fr;
      }
    }

    .faq {
      padding: 64px 0 96px;
    }

    .faq h2 {
      margin: 0 0 32px;
      font-size: var(--font-h2);
    }

    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .faq-item {
      border-bottom: 1px solid var(--stone);
      padding: 16px 0;
    }

    .faq-item summary {
      cursor: pointer;
      font-weight: 500;
      font-family: 'Fraunces', serif;
      font-size: var(--font-small);
    }

    .faq-item p {
      margin: 12px 0 0;
      color: var(--charcoal);
      font-size: var(--font-small);
      line-height: 1.65;
    }

    .location {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .location-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .location-inner h2 {
      margin: 0 0 16px;
      font-size: var(--font-h2);
    }

    .location-address {
      margin: 0 0 20px;
      color: var(--charcoal);
    }

    .nearby-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

      color: rgba(251, 250, 246, 0.76);
      font-size: var(--font-small);

      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }

    .policy-links a {
      padding: 8px 12px;
      border: 1px solid rgba(251, 250, 246, 0.26);

      font-size: var(--font-small);
      transition: background 0.2s ease, border-color 0.2s ease;

    .policy-links a:hover {
      background: rgba(251, 250, 246, 0.1);

      justify-content: space-between;
      gap: 16px;

    .reveal.in {
      opacity: 1;
      transform: translateY(0);

    .reveal-stagger > *:nth-child(4) { transition-delay: 0.35s; }

      text-align: left;
      padding: 12px 16px;

      color: var(--charcoal);
      font-size: var(--font-small);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .chat-options button:hover,
    .chat-options a:hover {
      background: var(--clay);
      color: #FFFFFF;
    }

    @media (max-width: 480px) {
      .chat-panel {
        right: 16px;
        left: 16px;
        width: auto;
        max-width: none;
      }

      .chat-fab {
        right: 16px;
      }
    }

    @media (max-width: 760px) {
      body {
        padding-bottom: 78px;
      }

      .mobile-sticky-bar {

        right: 0;

        font-size: var(--font-button);

      .mobile-sticky-bar a:not(:first-child) {

      .chat-fab {

      }

      .policy-links {
        justify-content: flex-start;
      }
    }

</head>
<body>
  <div class="intro-loader" id="intro-loader" aria-hidden="true">
    <img src="logo/logo-clean.png" alt="">

  <div id="app">Loading…</div>

  <script>
    (async function () {
      const app = document.getElementById('app');
      const introLoader = document.getElementById('intro-loader');
      const introStartedAt = Date.now();

      function dismissIntroLoader() {
        if (!introLoader) return;
        const elapsed = Date.now() - introStartedAt;
        const delay = Math.max(0, 2000 - elapsed);
        window.setTimeout(function () {
          introLoader.classList.add('done');
        }, delay);
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      try {
        const res = await fetch('content/site-data.json', { cache: 'no-store' });
        const data = await res.json();

        document.title = `${data.hotel.name} — ${data.hotel.tagline}`;

        const bandClass = { a: 'band-a', b: 'band-b', c: 'band-c' };
        const roomsHtml = data.rooms.map(function (room) {
          return `
            <div class="room-card">
              <div class="room-band ${bandClass[room.photo_style] || 'band-a'}">
                <p class="room-band-tag">${esc(room.tag)}</p>
                <div class="room-photo-placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M4 8h3l1.5-2h7L17 8h3v10H4V8z"></path>
                    <circle cx="12" cy="13" r="3.2"></circle>
                  </svg>
                  <p class="room-photo-note">Room visuals will be updated soon</p>
                </div>
              </div>
              <div class="room-body">
                <h3>${esc(room.name)}</h3>
                <p class="room-desc">${esc(room.description)}</p>
                <p class="room-meta">${esc(room.bed)} · ${esc(room.price)}</p>
              </div>
            </div>
          `;
        }).join('');

        const amenitiesHtml = data.amenities.map(function (item, i) {
          return `
            <div class="amenity-card">
              <span class="amenity-num">${String(i + 1).padStart(2, '0')}</span>
              <h3>${esc(item.title)}</h3>
              <p>${esc(item.description)}</p>
            </div>
          `;
        }).join('');

        const galleryHtml = data.gallery.map(function (item) {
          return `
            <div class="gallery-tile" aria-label="${esc(item.label)}">
              ${item.image ? `<img src="${esc(item.image)}" alt="${esc(item.label)}" loading="lazy">` : ''}
            </div>
          `;
        }).join('');

        const reviewsHtml = data.reviews.map(function (review) {
          const stars = '★'.repeat(review.stars) + '☆'.repeat(5 - review.stars);
          return `
            <div class="review-card">
              <p class="review-stars">${stars}</p>
              <p class="review-text">${esc(review.text)}</p>
              <p class="review-source">${esc(review.source)}</p>
            </div>
          `;
        }).join('');

        const otaHtml = data.ota_links.map(function (ota) {
          return `
            <a class="ota-card" href="${esc(ota.url)}" target="_blank" rel="noopener noreferrer">
              <span class="ota-name">${esc(ota.name)}</span>
              <span class="ota-cta">Check availability</span>

        const faqHtml = data.faq.map(function (item, i) {
          return `
            <details class="faq-item"${i === 0 ? ' open' : ''}>

              <p>${esc(item.answer)}</p>

        const policyHtml = policyLinks.map(function (item) {
          return `<a href="${esc(item.url)}">${esc(item.label)}</a>`;
        }).join('');

        const logoAlt = esc(data.hotel.name) + ' — ' + esc(data.hotel.tagline);
        const logoImg = `<img class="brand-logo" src="logo/logo-clean.png" alt="${logoAlt}" loading="eager">`;

        app.outerHTML = `
          <header class="site-header">

              <div class="wrap nav">
                <div class="brand">
                  ${logoImg}
                </div>
                <nav class="desktop-nav" aria-label="Primary navigation">

                  <a href="#gallery">Gallery</a>

                  <a href="#contact">Contact</a>

                <a class="btn-rooms" href="#rooms">View Rooms</a>

                  <span></span>
                  <span></span>
                  <span></span>

            </div>
            <nav class="mobile-nav" id="mobile-nav">
              <a href="#amenities">Amenities</a>
              <a href="#gallery">Gallery</a>
              <a href="#reviews">Reviews</a>
              <a href="#faq">FAQ</a>

          <section class="address-strip" aria-label="Hotel address and contact">

              <h1>${esc(data.hero.heading_plain)} <em>${esc(data.hero.heading_emphasis)}</em></h1>
              <p class="hero-subtext">${esc(data.hero.subtext)}</p>

          <section id="rooms" class="rooms">

              <div class="rooms-grid reveal-stagger">
                ${roomsHtml}
              </div>

              </div>
            </div>
          </section>

          <section id="book" class="book reveal">

              <div class="contact-links">
                <a href="https://wa.me/${esc(data.hotel.whatsapp)}?text=${whatsappMessage}" target="_blank" rel="noopener noreferrer">
                  <span class="whatsapp-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path fill="currentColor" d="M19.1 4.9A9.9 9.9 0 0 0 3.4 16.8L2 22l5.3-1.4A9.9 9.9 0 0 0 22 12a9.8 9.8 0 0 0-2.9-7.1Zm-7 15.4c-1.5 0-2.9-.4-4.2-1.1l-.3-.2-3.1.8.8-3-.2-.3A8.2 8.2 0 1 1 12.1 20.3Zm4.5-6.1c-.2-.1-1.5-.7-1.7-.8-.2-.1-.4-.1-.6.1-.2.3-.6.8-.8 1-.1.2-.3.2-.5.1-.2-.1-1-.4-2-1.2-.7-.7-1.2-1.5-1.4-1.7-.1-.2 0-.4.1-.5l.4-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.6-1.4-.8-1.9-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.2.3-1 1-1 2.3s1 2.7 1.1 2.9c.1.2 2 3.1 4.8 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.6-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.2-1.2-.1-.2-.2-.2-.4-.3Z"/>
                    </svg>
                  </span>
                  Chat on WhatsApp
                </a>
                <a href="tel:${esc(data.hotel.phone)}">Call</a>
                <a href="mailto:${esc(data.hotel.email)}">Email</a>
              </div>
              <form class="contact-form" id="contact-form">
                <input type="text" name="fullname" placeholder="Name" autocomplete="name" required>
                <input type="tel" name="phone" placeholder="Phone" autocomplete="tel" required>
                <input type="text" name="dates" placeholder="Preferred dates" autocomplete="off">
                <textarea name="message" placeholder="Message" autocomplete="off"></textarea>
                <button type="submit">Send</button>
              </form>
              <div class="support-panel" aria-label="Guest support and policies">
                <div>
                  <h3>${esc(support.title || 'Guest Support')}</h3>
                  <p>${esc(support.subtitle || 'Helpful policies and support links for a smoother stay.')}</p>
                </div>
                <div class="policy-links">
                  ${policyHtml}
                </div>
              </div>
            </div>
          </section>

          <footer class="site-footer">
            <div class="wrap footer-inner">
              <div>
                <p class="footer-name">${esc(data.hotel.name)}</p>
                <p class="footer-tagline">${esc(data.hotel.tagline)}</p>
              </div>
              <p class="footer-address">${esc(data.hotel.address)}</p>
              <p class="footer-year">© ${year} ${esc(data.hotel.name)}</p>
            </div>
          </footer>

          <nav class="mobile-sticky-bar" aria-label="Quick contact actions">
            <a href="#book">Book Now</a>
            <a href="tel:${esc(data.hotel.phone)}">Call</a>
            <a href="https://wa.me/${esc(data.hotel.whatsapp)}?text=${whatsappMessage}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
          </nav>

          <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 19V5"></path>
              <path d="M5 12l7-7 7 7"></path>
            </svg>
          </button>

          <button class="chat-fab" id="chat-fab" aria-label="Open chat" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
          </button>

          <div class="chat-panel" id="chat-panel" role="dialog" aria-label="Ask Iva chat">
            <div class="chat-header">
              <span>Ask Iva</span>
              <button class="chat-close" id="chat-close" aria-label="Close chat" type="button">&times;</button>
            </div>
            <div class="chat-messages" id="chat-messages">
              <div class="chat-msg bot">Hi! I can answer quick questions about rooms, amenities, or booking. What would you like to know?</div>
            </div>
            <div class="chat-options" id="chat-options"></div>
          </div>
        `;

        const reviewsCarousel = document.getElementById('reviews-carousel');
        if (reviewsCarousel) {
          const track = document.getElementById('reviews-track');
          const prevBtn = document.getElementById('reviews-prev');
          const nextBtn = document.getElementById('reviews-next');
          const dotsEl = document.getElementById('reviews-dots');
          const cards = Array.from(track.querySelectorAll('.review-card'));
          const mobileQuery = window.matchMedia('(max-width: 900px)');
          let page = 0;
          let perPage = mobileQuery.matches ? 1 : 3;
          let pageCount = Math.ceil(cards.length / perPage);
          let touchStartX = 0;

          function renderDots() {
            dotsEl.innerHTML = '';
            for (let i = 0; i < pageCount; i += 1) {
              const dot = document.createElement('button');
              dot.type = 'button';
              dot.className = 'review-dot';
              dot.setAttribute('aria-label', 'Show review group ' + (i + 1));
              dot.addEventListener('click', function () {
                goToPage(i);
              });
              dotsEl.appendChild(dot);
            }
          }

          function updateCarousel() {
            const targetCard = cards[page * perPage];
            const offset = targetCard ? targetCard.offsetLeft : 0;
            track.style.transform = 'translateX(' + (-offset) + 'px)';
            Array.from(dotsEl.children).forEach(function (dot, i) {
              dot.classList.toggle('active', i === page);
              dot.setAttribute('aria-current', i === page ? 'true' : 'false');
            });
          }

          function goToPage(nextPage) {
            page = (nextPage + pageCount) % pageCount;
            updateCarousel();
          }

          function refreshCarousel() {
            perPage = mobileQuery.matches ? 1 : 3;
            pageCount = Math.ceil(cards.length / perPage);
            page = Math.min(page, pageCount - 1);
            renderDots();
            updateCarousel();
          }

          prevBtn.addEventListener('click', function () {
            goToPage(page - 1);
          });

          nextBtn.addEventListener('click', function () {
            goToPage(page + 1);
          });

          track.addEventListener('touchstart', function (e) {
            touchStartX = e.touches[0].clientX;
          }, { passive: true });

          track.addEventListener('touchend', function (e) {
            const distance = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(distance) > 40) {
              goToPage(distance < 0 ? page + 1 : page - 1);
            }
          });

          window.addEventListener('resize', refreshCarousel);
          refreshCarousel();
        }

        const contactForm = document.getElementById('contact-form');
        if (contactForm) {
          contactForm.addEventListener('submit', function (e) {
            e.preventDefault();
            alert('This is a demo form — no submissions are sent yet.');
          });
        }

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileNav = document.getElementById('mobile-nav');
        if (hamburgerBtn && mobileNav) {
          hamburgerBtn.addEventListener('click', function () {
            const isOpen = mobileNav.classList.toggle('open');
            hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
            hamburgerBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
          });

          mobileNav.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
              mobileNav.classList.remove('open');
              hamburgerBtn.setAttribute('aria-expanded', 'false');
              hamburgerBtn.setAttribute('aria-label', 'Open menu');
            });
          });
        }

        const backToTop = document.getElementById('back-to-top');
        if (backToTop) {
          const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
          function updateBackToTop() {
            backToTop.classList.toggle('visible', window.scrollY > 480);
          }

          backToTop.addEventListener('click', function () {
            window.scrollTo({
              top: 0,
              behavior: reducedMotion.matches ? 'auto' : 'smooth'
            });
          });

          window.addEventListener('scroll', updateBackToTop, { passive: true });
          updateBackToTop();
        }

        const chatFab = document.getElementById('chat-fab');
        const chatPanel = document.getElementById('chat-panel');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatOptions = document.getElementById('chat-options');

        if (chatFab && chatPanel && chatMessages && chatOptions) {
          const checkinFaq = data.faq.find(function (item) {
            return item.question.toLowerCase().indexOf('check-in') !== -1;
          });
          const cancellationFaq = data.faq.find(function (item) {
            return item.question.toLowerCase().indexOf('cancellation') !== -1;
          });

          function waLink(message) {
            return 'https://wa.me/' + esc(data.hotel.whatsapp) + '?text=' + encodeURIComponent(message);
          }

          function addChatMessage(text, from) {
            const bubble = document.createElement('div');
            bubble.className = 'chat-msg ' + from;
            bubble.textContent = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }

          function renderChatOptions(options) {
            chatOptions.innerHTML = '';
            options.forEach(function (opt) {
              if (opt.href) {
                const a = document.createElement('a');
                a.href = opt.href;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.textContent = opt.label;
                chatOptions.appendChild(a);
              } else {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = opt.label;
                btn.addEventListener('click', opt.action);
                chatOptions.appendChild(btn);
              }
            });
          }

          function followUpOptions(topic) {
            return [
              { label: 'Ask something else', action: showChatMenu },
              { label: 'Talk to the hotel directly', href: waLink('Hi, I have a question about ' + topic + ' at ' + data.hotel.name + '.') }
            ];
          }

          function showChatMenu() {
            renderChatOptions([
              { label: 'What rooms do you have?', action: answerRooms },
              { label: 'What amenities are included?', action: answerAmenities },
              { label: 'Check-in / check-out times?', action: answerCheckin },
              { label: 'Cancellation policy?', action: answerCancellation },
              { label: 'Talk to the hotel directly', href: waLink('Hi, I have a question about a stay at ' + data.hotel.name + '.') }
            ]);
          }

          function answerRooms() {
            addChatMessage('What rooms do you have?', 'user');
            const lines = data.rooms.map(function (room) {
              return room.name + ' — ' + room.bed + ', ' + room.price;
            }).join('\n');
            addChatMessage(lines, 'bot');
            renderChatOptions(followUpOptions('room options'));
          }

          function answerAmenities() {
            addChatMessage('What amenities are included?', 'user');
            const lines = data.amenities.map(function (item) {
              return item.title;
            }).join('\n');
            addChatMessage(lines, 'bot');
            renderChatOptions(followUpOptions('the amenities'));
          }

          function answerCheckin() {
            addChatMessage('Check-in / check-out times?', 'user');
            if (checkinFaq) {
              addChatMessage(checkinFaq.question + '\n' + checkinFaq.answer, 'bot');
            } else {
              addChatMessage("I don't have that on file — best to check with the hotel directly.", 'bot');
            }
            renderChatOptions(followUpOptions('check-in and check-out'));
          }

          function answerCancellation() {
            addChatMessage('Cancellation policy?', 'user');
            if (cancellationFaq) {
              addChatMessage(cancellationFaq.question + '\n' + cancellationFaq.answer, 'bot');
            } else {
              addChatMessage("I don't have that on file — best to check with the hotel directly.", 'bot');
            }
            renderChatOptions(followUpOptions('the cancellation policy'));
          }

          showChatMenu();

          chatFab.addEventListener('click', function () {
            const isOpen = chatPanel.classList.toggle('open');
            chatFab.setAttribute('aria-expanded', String(isOpen));
          });

          if (chatClose) {
            chatClose.addEventListener('click', function () {
              chatPanel.classList.remove('open');
              chatFab.setAttribute('aria-expanded', 'false');
            });
          }
        }

        const revealTargets = document.querySelectorAll('.reveal, .reveal-stagger');
        if ('IntersectionObserver' in window) {
          const revealObserver = new IntersectionObserver(function (entries, observer) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('in');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.15 });

          revealTargets.forEach(function (el) {
            revealObserver.observe(el);
          });
        } else {
          revealTargets.forEach(function (el) {
            el.classList.add('in');
          });
        }
      } catch (err) {
        app.innerHTML = '<p>Could not load site content. Check content/site-data.json.</p>';
        console.error(err);
      } finally {
        dismissIntroLoader();
      }
    })();
  </script>
</body>
</html>
