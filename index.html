<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iva By SKR — A Petrichor Hotel</title>
  <meta name="description" content="Iva By SKR — A Petrichor Hotel. A quiet stay opposite Hebbagodi Metro Station, Electronic City, Bengaluru.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --earth: #3B2E23;
      --moss: #3F4A38;
      --clay: #A9663F;
      --olive: #B0B42E;
      --olive-dark: #8D9124;
      --mist: #F3EFE6;
      --stone: #C9C2B4;
      --dusk-gold: #C79A4B;
      --paper: #FBFAF6;
    }

    html {
      scroll-behavior: smooth;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--earth);
      font-family: 'Work Sans', sans-serif;
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .site-header {
      background: #FFFFFF;
      box-shadow: 0 1px 0 rgba(59, 46, 35, 0.08);
      position: relative;
      z-index: 10;
    }

    .main-header {
      min-height: 168px;
      display: flex;
      align-items: center;
    }

    .site-header .wrap {
      max-width: 1650px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      position: relative;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand-logo {
      height: 148px;
      width: auto;
      max-width: 280px;
      display: block;
      object-fit: contain;
    }

    .mobile-nav-brand .brand-logo {
      height: 72px;
      max-width: 150px;
    }

    .mobile-nav-brand {
      padding: 4px 0 16px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--stone);
    }

    .btn-book {
      background: var(--olive);
      color: #FFFFFF;
      padding: 22px 42px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      line-height: 1;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn-book:hover {
      background: var(--olive-dark);
      transform: translateY(-1px);
    }

    .btn-rooms {
      color: var(--clay);
      padding: 20px 34px;
      border: 2px solid var(--clay);
      border-radius: 10px;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .btn-rooms:hover {
      background: var(--clay);
      color: #FFFFFF;
      transform: translateY(-1px);
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      flex-wrap: wrap;
      gap: 14px clamp(22px, 2vw, 36px);
      margin-left: auto;
    }

    .desktop-nav a {
      display: block;
      color: #050505;
      text-decoration: none;
      font-size: clamp(1.08rem, 1.15vw, 1.28rem);
      font-weight: 600;
      line-height: 1.2;
    }

    .desktop-nav a:hover {
      color: var(--olive-dark);
    }

    .nav-caret {
      display: inline-block;
      margin-left: 6px;
      transform: translateY(-1px);
      font-size: 0.95em;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      gap: 5px;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      flex: none;
    }

    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--earth);
      border-radius: 1px;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      padding: 8px 24px 16px;
      background: #FFFFFF;
      border-top: 1px solid rgba(59, 46, 35, 0.12);
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav a {
      padding: 14px 0;
      color: var(--earth);
      text-decoration: none;
      font-size: 1.08rem;
      font-weight: 600;
      border-bottom: 1px solid var(--stone);
    }

    .mobile-nav a:last-child {
      border-bottom: 0;
    }

    @media (max-width: 760px) {
      .brand-logo {
        height: 104px;
        max-width: 200px;
      }

      .desktop-nav {
        display: none;
      }

      .nav > .btn-book,
      .nav > .btn-rooms {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .main-header {
        min-height: 120px;
      }

      .nav {
        gap: 16px;
      }
    }

    .hero {
      padding: 0;
    }

    .hero-image {
      min-height: clamp(420px, 42vw, 620px);
      background-image:
        linear-gradient(to bottom, transparent 55%, rgba(59, 46, 35, 0.28) 100%),
        url("images/hero.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    @media (max-width: 760px) {
      .hero-image {
        min-height: clamp(260px, 68vw, 340px);
      }
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      color: var(--clay);
      margin: 0 0 16px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      margin: 0 0 20px;
      max-width: 18ch;
    }

    .hero h1 em {
      color: var(--clay);
      font-style: italic;
    }

    .hero-subtext {
      max-width: 60ch;
      color: var(--earth);
      font-size: 1.05rem;
    }

    .rooms {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .rooms h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .room-card {
      background: var(--paper);
      border-radius: 4px;
      overflow: hidden;
    }

    .room-band {
      height: 140px;
    }

    .band-a {
      background: linear-gradient(135deg, var(--moss), #6B7A5E);
    }

    .band-b {
      background: linear-gradient(135deg, var(--clay), var(--dusk-gold));
    }

    .band-c {
      background: linear-gradient(135deg, var(--stone), #DED7C9);
    }

    .room-body {
      padding: 20px;
    }

    .room-tag {
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--moss);
      margin: 0 0 8px;
    }

    .room-body h3 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .room-desc {
      color: var(--earth);
      margin: 0 0 16px;
    }

    .room-meta {
      font-size: 0.9rem;
      color: var(--moss);
      margin: 0;
    }

    @media (max-width: 900px) {
      .rooms-grid {
        grid-template-columns: 1fr;
      }
    }

    .amenities {
      padding: 64px 0 96px;
    }

    .amenities h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
    }

    .amenities-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }

    .amenity-card {
      padding: 24px;
      border: 1px solid var(--stone);
      border-radius: 4px;
    }

    .amenity-num {
      display: block;
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      color: var(--clay);
      margin-bottom: 12px;
    }

    .amenity-card h3 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .amenity-card p {
      margin: 0;
      color: var(--earth);
      font-size: 0.95rem;
    }

    @media (max-width: 800px) {
      .amenities-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .amenities-grid {
        grid-template-columns: 1fr;
      }
    }

    .gallery {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .gallery h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .gallery-tile {
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: flex-end;
      padding: 16px;
      border-radius: 4px;
      color: var(--earth);
      font-weight: 500;
    }

    @media (max-width: 720px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .reviews {
      padding: 64px 0 96px;
    }

    .reviews h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
      max-width: 32ch;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .review-card {
      padding: 24px;
      background: var(--mist);
      border-radius: 4px;
    }

    .review-stars {
      color: var(--dusk-gold);
      letter-spacing: 0.1em;
      margin: 0 0 12px;
    }

    .review-text {
      margin: 0 0 16px;
      color: var(--earth);
    }

    .review-source {
      margin: 0;
      font-size: 0.85rem;
      color: var(--moss);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 900px) {
      .reviews-grid {
        grid-template-columns: 1fr;
      }
    }

    .book {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .book h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
    }

    .ota-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .ota-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px;
      background: var(--paper);
      border-radius: 4px;
      text-decoration: none;
      color: var(--earth);
      border: 1px solid var(--stone);
    }

    .ota-name {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 1.1rem;
    }

    .ota-cta {
      font-size: 0.85rem;
      color: var(--clay);
    }

    @media (max-width: 800px) {
      .ota-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .ota-grid {
        grid-template-columns: 1fr;
      }
    }

    .faq {
      padding: 64px 0 96px;
    }

    .faq h2 {
      margin: 0 0 32px;
      font-size: 1.75rem;
    }

    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .faq-item {
      border-bottom: 1px solid var(--stone);
      padding: 16px 0;
    }

    .faq-item summary {
      cursor: pointer;
      font-weight: 500;
      font-family: 'Fraunces', serif;
    }

    .faq-item p {
      margin: 12px 0 0;
      color: var(--earth);
    }

    .location {
      padding: 64px 0 96px;
      background: var(--mist);
    }

    .location-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .location-inner h2 {
      margin: 0 0 16px;
      font-size: 1.75rem;
    }

    .location-address {
      margin: 0 0 20px;
      color: var(--earth);
    }

    .nearby-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nearby-list li {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--stone);
      padding-bottom: 8px;
    }

    .location-map {
      width: 100%;
      height: 320px;
      border: 0;
      border-radius: 4px;
    }

    @media (max-width: 800px) {
      .location-inner {
        grid-template-columns: 1fr;
      }
    }

    .contact {
      padding: 64px 0 96px;
    }

    .contact h2 {
      margin: 0 0 24px;
      font-size: 1.75rem;
    }

    .contact-links {
      display: flex;
      gap: 16px;
      margin: 0 0 32px;
      flex-wrap: wrap;
    }

    .contact-links a {
      padding: 10px 20px;
      border: 1px solid var(--clay);
      border-radius: 2px;
      text-decoration: none;
      color: var(--clay);
      font-weight: 500;
    }

    .contact-form {
      display: grid;
      gap: 16px;
      max-width: 560px;
    }

    .contact-form input,
    .contact-form textarea {
      padding: 12px;
      border: 1px solid var(--stone);
      border-radius: 2px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--paper);
      color: var(--earth);
    }

    .contact-form textarea {
      min-height: 120px;
      resize: vertical;
    }

    .contact-form button {
      justify-self: start;
      padding: 10px 20px;
      background: var(--moss);
      color: var(--paper);
      border: 0;
      border-radius: 2px;
      font-weight: 500;
      cursor: pointer;
    }

    .site-footer {
      padding: 40px 0;
      background: var(--earth);
      color: var(--mist);
    }

    .footer-inner {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .footer-name {
      margin: 0;
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 1.1rem;
    }

    .footer-tagline {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: var(--stone);
    }

    .footer-address,
    .footer-year {
      margin: 0;
      font-size: 0.85rem;
      color: var(--stone);
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s cubic-bezier(.2,.7,.2,1), transform 0.8s cubic-bezier(.2,.7,.2,1);
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-stagger > * {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s cubic-bezier(.2,.7,.2,1), transform 0.8s cubic-bezier(.2,.7,.2,1);
    }

    .reveal-stagger.in > * {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-stagger > *:nth-child(1) { transition-delay: 0.05s; }
    .reveal-stagger > *:nth-child(2) { transition-delay: 0.15s; }
    .reveal-stagger > *:nth-child(3) { transition-delay: 0.25s; }
    .reveal-stagger > *:nth-child(4) { transition-delay: 0.35s; }

    @keyframes heroFadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero h1,
    .hero-subtext,
    .hero-cta {
      opacity: 0;
      animation: heroFadeUp 0.8s cubic-bezier(.2,.7,.2,1) forwards;
    }

    .hero h1 { animation-delay: 0.1s; }
    .hero-subtext { animation-delay: 0.3s; }
    .hero-cta { animation-delay: 0.5s; }

    .hero-cta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    .btn-outline {
      padding: 10px 20px;
      border: 1px solid var(--clay);
      border-radius: 2px;
      text-decoration: none;
      color: var(--clay);
      font-weight: 500;
      background: transparent;
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal,
      .reveal.in,
      .reveal-stagger > *,
      .reveal-stagger.in > * {
        opacity: 1;
        transform: none;
        transition: none;
      }

      .hero h1,
      .hero-subtext,
      .hero-cta {
        opacity: 1;
        transform: none;
        animation: none;
      }
    }

    .chat-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--clay);
      color: var(--paper);
      border: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(59, 46, 35, 0.25);
      z-index: 1000;
    }

    .chat-fab svg {
      width: 26px;
      height: 26px;
    }

    .chat-panel {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 320px;
      max-width: calc(100vw - 48px);
      max-height: 70vh;
      background: var(--paper);
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(59, 46, 35, 0.25);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
    }

    .chat-panel.open {
      display: flex;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--moss);
      color: var(--paper);
      font-family: 'Fraunces', serif;
      font-weight: 500;
    }

    .chat-close {
      background: transparent;
      border: 0;
      color: var(--paper);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-line;
    }

    .chat-msg.bot {
      align-self: flex-start;
      background: var(--mist);
      color: var(--earth);
      border-bottom-left-radius: 4px;
    }

    .chat-msg.user {
      align-self: flex-end;
      background: var(--clay);
      color: var(--paper);
      border-bottom-right-radius: 4px;
    }

    .chat-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--stone);
    }

    .chat-options button,
    .chat-options a {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border: 1px solid var(--clay);
      border-radius: 8px;
      background: var(--paper);
      color: var(--clay);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }

    .chat-options button:hover,
    .chat-options a:hover {
      background: var(--clay);
      color: var(--paper);
    }

    @media (max-width: 480px) {
      .chat-panel {
        right: 16px;
        left: 16px;
        width: auto;
        max-width: none;
        bottom: 88px;
      }

      .chat-fab {
        bottom: 16px;
        right: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    (async function () {
      const app = document.getElementById('app');

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      try {
        const res = await fetch('content/site-data.json', { cache: 'no-store' });
        const data = await res.json();

        document.title = `${data.hotel.name} — ${data.hotel.tagline}`;

        const bandClass = { a: 'band-a', b: 'band-b', c: 'band-c' };
        const galleryColors = ['#D9CBB8', '#B7C4A9', '#CBB6A3', '#A9B7B0', '#D6C2AE'];

        const roomsHtml = data.rooms.map(function (room) {
          return `
            <div class="room-card">
              <div class="room-band ${bandClass[room.photo_style] || 'band-a'}"></div>
              <div class="room-body">
                <p class="room-tag">${esc(room.tag)}</p>
                <h3>${esc(room.name)}</h3>
                <p class="room-desc">${esc(room.description)}</p>
                <p class="room-meta">${esc(room.bed)} · ${esc(room.price)}</p>
              </div>
            </div>
          `;
        }).join('');

        const amenitiesHtml = data.amenities.map(function (item, i) {
          return `
            <div class="amenity-card">
              <span class="amenity-num">${String(i + 1).padStart(2, '0')}</span>
              <h3>${esc(item.title)}</h3>
              <p>${esc(item.description)}</p>
            </div>
          `;
        }).join('');

        const galleryHtml = data.gallery.map(function (item, i) {
          const color = galleryColors[i % galleryColors.length];
          return `
            <div class="gallery-tile" style="background:${color}">
              <span>${esc(item.label)}</span>
            </div>
          `;
        }).join('');

        const reviewsHtml = data.reviews.map(function (review) {
          const stars = '★'.repeat(review.stars) + '☆'.repeat(5 - review.stars);
          return `
            <div class="review-card">
              <p class="review-stars">${stars}</p>
              <p class="review-text">${esc(review.text)}</p>
              <p class="review-source">${esc(review.source)}</p>
            </div>
          `;
        }).join('');

        const otaHtml = data.ota_links.map(function (ota) {
          return `
            <a class="ota-card" href="${esc(ota.url)}" target="_blank" rel="noopener">
              <span class="ota-name">${esc(ota.name)}</span>
              <span class="ota-cta">Check availability</span>
            </a>
          `;
        }).join('');

        const faqHtml = data.faq.map(function (item, i) {
          return `
            <details class="faq-item"${i === 0 ? ' open' : ''}>
              <summary>${esc(item.question)}</summary>
              <p>${esc(item.answer)}</p>
            </details>
          `;
        }).join('');

        const nearbyHtml = data.location.nearby.map(function (place) {
          return `<li><span>${esc(place.name)}</span><span>${esc(place.distance)}</span></li>`;
        }).join('');

        const whatsappMessage = encodeURIComponent('Hi, I would like to know more about a stay at ' + data.hotel.name + '.');
        const year = new Date().getFullYear();

        const logoAlt = esc(data.hotel.name) + ' — ' + esc(data.hotel.tagline);
        const logoImg = `<img class="brand-logo" src="logo/logo-clean.png" alt="${logoAlt}" loading="eager">`;

        app.outerHTML = `
          <header class="site-header">
            <div class="main-header">
              <div class="wrap nav">
                <div class="brand">
                  ${logoImg}
                </div>
                <nav class="desktop-nav" aria-label="Primary navigation">
                  <a href="#amenities">Amenities</a>
                  <a href="#gallery">Gallery</a>
                  <a href="#reviews">Reviews</a>
                  <a href="#faq">FAQ</a>
                  <a href="#location">Location</a>
                  <a href="#contact">Contact</a>
                </nav>
                <a class="btn-rooms" href="#rooms">View Rooms</a>
                <a class="btn-book" href="#book">Book Now</a>
                <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
              </div>
            </div>
            <nav class="mobile-nav" id="mobile-nav">
              <div class="brand mobile-nav-brand">
                ${logoImg}
              </div>
              <a href="#amenities">Amenities</a>
              <a href="#gallery">Gallery</a>
              <a href="#reviews">Reviews</a>
              <a href="#faq">FAQ</a>
              <a href="#location">Location</a>
              <a href="#contact">Contact</a>
              <a href="#rooms">View Rooms</a>
            </nav>
          </header>

          <section class="hero">
            <div class="hero-image" role="img" aria-label="${esc(data.hotel.name)} hotel photo"></div>
          </section>

          <section id="rooms" class="rooms">
            <div class="wrap">
              <h2>Three rooms, one standard of quiet.</h2>
              <div class="rooms-grid reveal-stagger">
                ${roomsHtml}
              </div>
            </div>
          </section>

          <section id="amenities" class="amenities reveal">
            <div class="wrap">
              <h2>Everything within a floor or two.</h2>
              <div class="amenities-grid reveal-stagger">
                ${amenitiesHtml}
              </div>
            </div>
          </section>

          <section id="gallery" class="gallery reveal">
            <div class="wrap">
              <h2>Gallery</h2>
              <div class="gallery-grid">
                ${galleryHtml}
              </div>
            </div>
          </section>

          <section id="reviews" class="reviews reveal">
            <div class="wrap">
              <h2>Rated consistently well across platforms.</h2>
              <div class="reviews-grid reveal-stagger">
                ${reviewsHtml}
              </div>
            </div>
          </section>

          <section id="book" class="book reveal">
            <div class="wrap">
              <h2>Choose where you'd like to book.</h2>
              <div class="ota-grid">
                ${otaHtml}
              </div>
            </div>
          </section>

          <section id="faq" class="faq reveal">
            <div class="wrap">
              <h2>Frequently asked</h2>
              <div class="faq-list">
                ${faqHtml}
              </div>
            </div>
          </section>

          <section id="location" class="location reveal">
            <div class="wrap location-inner">
              <div class="location-info">
                <h2>Find us</h2>
                <p class="location-address">${esc(data.hotel.address)}</p>
                <ul class="nearby-list">
                  ${nearbyHtml}
                </ul>
              </div>
              <iframe class="location-map" src="${esc(data.location.map_embed_url)}" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
          </section>

          <section id="contact" class="contact reveal">
            <div class="wrap">
              <h2>We reply the same day.</h2>
              <div class="contact-links">
                <a href="https://wa.me/${esc(data.hotel.whatsapp)}?text=${whatsappMessage}" target="_blank" rel="noopener">WhatsApp</a>
                <a href="tel:${esc(data.hotel.phone)}">Call</a>
                <a href="mailto:${esc(data.hotel.email)}">Email</a>
              </div>
              <form class="contact-form" id="contact-form">
                <input type="text" name="fullname" placeholder="Name" autocomplete="name" required>
                <input type="tel" name="phone" placeholder="Phone" autocomplete="tel" required>
                <input type="text" name="dates" placeholder="Preferred dates" autocomplete="off">
                <textarea name="message" placeholder="Message" autocomplete="off"></textarea>
                <button type="submit">Send</button>
              </form>
            </div>
          </section>

          <footer class="site-footer">
            <div class="wrap footer-inner">
              <div>
                <p class="footer-name">${esc(data.hotel.name)}</p>
                <p class="footer-tagline">${esc(data.hotel.tagline)}</p>
              </div>
              <p class="footer-address">${esc(data.hotel.address)}</p>
              <p class="footer-year">© ${year} ${esc(data.hotel.name)}</p>
            </div>
          </footer>

          <button class="chat-fab" id="chat-fab" aria-label="Open chat" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
          </button>

          <div class="chat-panel" id="chat-panel" role="dialog" aria-label="Ask Iva chat">
            <div class="chat-header">
              <span>Ask Iva</span>
              <button class="chat-close" id="chat-close" aria-label="Close chat" type="button">&times;</button>
            </div>
            <div class="chat-messages" id="chat-messages">
              <div class="chat-msg bot">Hi! I can answer quick questions about rooms, amenities, or booking. What would you like to know?</div>
            </div>
            <div class="chat-options" id="chat-options"></div>
          </div>
        `;

        const contactForm = document.getElementById('contact-form');
        if (contactForm) {
          contactForm.addEventListener('submit', function (e) {
            e.preventDefault();
            alert('This is a demo form — no submissions are sent yet.');
          });
        }

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileNav = document.getElementById('mobile-nav');
        if (hamburgerBtn && mobileNav) {
          hamburgerBtn.addEventListener('click', function () {
            const isOpen = mobileNav.classList.toggle('open');
            hamburgerBtn.setAttribute('aria-expanded', String(isOpen));
            hamburgerBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
          });

          mobileNav.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
              mobileNav.classList.remove('open');
              hamburgerBtn.setAttribute('aria-expanded', 'false');
              hamburgerBtn.setAttribute('aria-label', 'Open menu');
            });
          });
        }

        const chatFab = document.getElementById('chat-fab');
        const chatPanel = document.getElementById('chat-panel');
        const chatClose = document.getElementById('chat-close');
        const chatMessages = document.getElementById('chat-messages');
        const chatOptions = document.getElementById('chat-options');

        if (chatFab && chatPanel && chatMessages && chatOptions) {
          const checkinFaq = data.faq.find(function (item) {
            return item.question.toLowerCase().indexOf('check-in') !== -1;
          });
          const cancellationFaq = data.faq.find(function (item) {
            return item.question.toLowerCase().indexOf('cancellation') !== -1;
          });

          function waLink(message) {
            return 'https://wa.me/' + esc(data.hotel.whatsapp) + '?text=' + encodeURIComponent(message);
          }

          function addChatMessage(text, from) {
            const bubble = document.createElement('div');
            bubble.className = 'chat-msg ' + from;
            bubble.textContent = text;
            chatMessages.appendChild(bubble);
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }

          function renderChatOptions(options) {
            chatOptions.innerHTML = '';
            options.forEach(function (opt) {
              if (opt.href) {
                const a = document.createElement('a');
                a.href = opt.href;
                a.target = '_blank';
                a.rel = 'noopener';
                a.textContent = opt.label;
                chatOptions.appendChild(a);
              } else {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = opt.label;
                btn.addEventListener('click', opt.action);
                chatOptions.appendChild(btn);
              }
            });
          }

          function followUpOptions(topic) {
            return [
              { label: 'Ask something else', action: showChatMenu },
              { label: 'Talk to the hotel directly', href: waLink('Hi, I have a question about ' + topic + ' at ' + data.hotel.name + '.') }
            ];
          }

          function showChatMenu() {
            renderChatOptions([
              { label: 'What rooms do you have?', action: answerRooms },
              { label: 'What amenities are included?', action: answerAmenities },
              { label: 'Check-in / check-out times?', action: answerCheckin },
              { label: 'Cancellation policy?', action: answerCancellation },
              { label: 'Talk to the hotel directly', href: waLink('Hi, I have a question about a stay at ' + data.hotel.name + '.') }
            ]);
          }

          function answerRooms() {
            addChatMessage('What rooms do you have?', 'user');
            const lines = data.rooms.map(function (room) {
              return room.name + ' — ' + room.bed + ', ' + room.price;
            }).join('\n');
            addChatMessage(lines, 'bot');
            renderChatOptions(followUpOptions('room options'));
          }

          function answerAmenities() {
            addChatMessage('What amenities are included?', 'user');
            const lines = data.amenities.map(function (item) {
              return item.title;
            }).join('\n');
            addChatMessage(lines, 'bot');
            renderChatOptions(followUpOptions('the amenities'));
          }

          function answerCheckin() {
            addChatMessage('Check-in / check-out times?', 'user');
            if (checkinFaq) {
              addChatMessage(checkinFaq.question + '\n' + checkinFaq.answer, 'bot');
            } else {
              addChatMessage("I don't have that on file — best to check with the hotel directly.", 'bot');
            }
            renderChatOptions(followUpOptions('check-in and check-out'));
          }

          function answerCancellation() {
            addChatMessage('Cancellation policy?', 'user');
            if (cancellationFaq) {
              addChatMessage(cancellationFaq.question + '\n' + cancellationFaq.answer, 'bot');
            } else {
              addChatMessage("I don't have that on file — best to check with the hotel directly.", 'bot');
            }
            renderChatOptions(followUpOptions('the cancellation policy'));
          }

          showChatMenu();

          chatFab.addEventListener('click', function () {
            const isOpen = chatPanel.classList.toggle('open');
            chatFab.setAttribute('aria-expanded', String(isOpen));
          });

          if (chatClose) {
            chatClose.addEventListener('click', function () {
              chatPanel.classList.remove('open');
              chatFab.setAttribute('aria-expanded', 'false');
            });
          }
        }

        const revealTargets = document.querySelectorAll('.reveal, .reveal-stagger');
        if ('IntersectionObserver' in window) {
          const revealObserver = new IntersectionObserver(function (entries, observer) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('in');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.15 });

          revealTargets.forEach(function (el) {
            revealObserver.observe(el);
          });
        } else {
          revealTargets.forEach(function (el) {
            el.classList.add('in');
          });
        }
      } catch (err) {
        app.innerHTML = '<p>Could not load site content. Check content/site-data.json.</p>';
        console.error(err);
      }
    })();
  </script>
</body>
</html>
