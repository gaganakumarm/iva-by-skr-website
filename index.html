<head>

  <title>Iva By SKR — A Petrichor Hotel</title>
  <meta name="description" content="Iva By SKR — A Petrichor Hotel. A quiet stay opposite Hebbagodi Metro Station, Electronic City, Bengaluru.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --earth: #3B2E23;
      --moss: #3F4A38;

      --stone: #C9C2B4;
      --dusk-gold: #C79A4B;
      --paper: #FBFAF6;

    html {

    }

    *,

      font-family: 'Work Sans', sans-serif;
      line-height: 1.6;
    }

    h1, h2, h3 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
    }

    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
